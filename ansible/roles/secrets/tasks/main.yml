---
# Inject secrets the cluster needs, directly (never via Git).
- name: Ensure argocd namespace exists
  ansible.builtin.shell: |
    {{ kubectl }} create namespace argocd \
      --dry-run=client -o yaml | {{ kubectl }} apply -f -
  changed_when: false

- name: Create ArgoCD repository credentials secret (for private GitHub repo access)
  ansible.builtin.shell: |
    {{ kubectl }} create secret generic repo-creds -n argocd \
      --from-literal=type=git \
      --from-literal=url='{{ git_repo }}' \
      --from-literal=username='x-access-token' \
      --from-literal=password='{{ github_token }}' \
      --dry-run=client -o yaml | {{ kubectl }} apply -f -
    {{ kubectl }} label secret repo-creds -n argocd \
      argocd.argoproj.io/secret-type=repository --overwrite
  no_log: true
  changed_when: false
