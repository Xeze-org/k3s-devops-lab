---
# Bootstrap the lab foundation. Runs inside the guest via ansible_local.
# Optional tools are NOT installed here — ArgoCD reconciles those from Git.
- name: Bootstrap k3s DevOps lab
  hosts: all
  become: true
  gather_facts: true

  vars:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    kubectl: "k3s kubectl --kubeconfig=/etc/rancher/k3s/k3s.yaml"
    tunnel_name: k3-kube
    # The following are supplied by Vagrant's extra_vars (from .env):
    #   domain, cf_api_token, cf_account_id, git_repo, git_branch, github_token

  pre_tasks:
    - name: Assert required variables are present
      ansible.builtin.assert:
        that:
          - domain | default('') | length > 0
          - cf_api_token | default('') | length > 0
          - cf_account_id | default('') | length > 0
          - github_token | default('') | length > 0
        fail_msg: "Missing required .env values (domain/cf_api_token/cf_account_id/github_token)."

  roles:
    - k3s
    - secrets
    - argocd
    - cloudflared
