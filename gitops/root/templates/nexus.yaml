{{- if .Values.nexus.enabled }}
# Nexus Repository Manager. JVM-heavy — only enable on an 8GB VM.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://sonatype.github.io/helm3-charts/
    chart: nexus-repository-manager
    # Pinned to major 204: ArgoCD adopts patch/minor charts automatically (so
    # security fixes like CVE-2024-4956 still roll in) but won't make a blind
    # major jump across a breaking DB migration. Widen to "*" for latest-always.
    targetRevision: "204.*"
    helm:
      values: |
        ingress:
          enabled: true
          ingressClassName: traefik
          hostPath: /
          hostRepo: nexus.{{ .Values.domain }}
        resources:
          requests:
            cpu: 500m
            memory: 1.5Gi
          limits:
            memory: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: nexus
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
