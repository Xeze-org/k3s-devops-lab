{{- if .Values.nexus.enabled }}
# Nexus Repository Manager. JVM-heavy — only enable on an 8GB VM.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://sonatype.github.io/helm3-charts/
    chart: nexus-repository-manager
    # Pinned to chart major 64 (latest is 64.2.0). NOTE: this Sonatype chart
    # lags the Nexus binary badly — its appVersion is stuck at 3.64.0, which is
    # BELOW the 3.68.1 that fixes CVE-2024-4956. So pinning the chart alone does
    # NOT remediate the CVE; we override image.tag below to a patched binary.
    targetRevision: "64.*"
    helm:
      values: |
        # Decouple the Nexus binary from the chart's stale 3.64.0 default and
        # pin a patched release (>= 3.68.1 closes CVE-2024-4956). Bump this tag
        # manually to adopt newer Nexus; the chart won't do it for us.
        image:
          tag: "3.93.2"
        ingress:
          enabled: true
          ingressClassName: traefik
          hostPath: /
          hostRepo: nexus.{{ .Values.domain }}
        resources:
          requests:
            cpu: 500m
            memory: 1.5Gi
          limits:
            memory: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: nexus
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
