{{- if .Values.jenkins.enabled }}
# Jenkins CI. JVM-heavy — only enable on an 8GB VM.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jenkins.io
    chart: jenkins
    # "*" = auto-track the latest chart. Pinning the chart while plugins float
    # causes drift: old core (5.7.27 => 2.479.2) eventually can't load plugins
    # that now require a newer Jenkins. Latest chart bundles a compatible pair.
    targetRevision: "*"
    helm:
      values: |
        controller:
          ingress:
            enabled: true
            ingressClassName: traefik
            hostName: jenkins.{{ .Values.domain }}
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
