{{- if .Values.jenkins.enabled }}
# Jenkins CI. JVM-heavy — only enable on an 8GB VM.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jenkins.io
    chart: jenkins
    # Pinned to major 5: minors/patches still float, so Jenkins core keeps
    # moving forward and stays plugin-compatible (avoids the drift where old
    # core can't load plugins that now require a newer Jenkins). Only the 5 => 6
    # major jump is held back for a human to vet. Widen to "*" for latest-always.
    targetRevision: "5.*"
    helm:
      values: |
        controller:
          ingress:
            enabled: true
            ingressClassName: traefik
            hostName: jenkins.{{ .Values.domain }}
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
