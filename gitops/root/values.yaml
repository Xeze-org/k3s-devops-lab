# ┌─────────────────────────────────────────────────────────────────────────┐
# │ THE config file. Edit this, `git push`, then `vagrant up`.               │
# │ Public repo => ArgoCD reads this directly, no token needed.              │
# └─────────────────────────────────────────────────────────────────────────┘

# Your Cloudflare domain. Tools are exposed at <tool>.<domain>.
domain: xeze.org

# This repo (ArgoCD pulls manifests from here).
repoURL: https://github.com/Xeze-org/k3s-devops-lab.git
branch: main

# Tool toggles:  true = ArgoCD installs it,  false = ArgoCD prunes it.
# (Also drives VM RAM/CPU sizing in the Vagrantfile.)
monitoring:
  enabled: false      # Prometheus + Grafana
loki:
  enabled: false      # Loki logs (shown in Grafana)
jenkins:
  enabled: true     # heavy: +2GB
nexus:
  enabled: true     # heavy: +2GB
harbor:
  enabled: false    # container registry at registry.<domain> — heavy: +2GB
